name: Build and Deploy Vue Frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        # We must tell it where your package.json is!
        run: npm install
        working-directory: NotesApplication.Frontend

      # Default `vite build` uses base `/`, so the browser requests
      # https://USER.github.io/assets/... — wrong for *project* sites, which
      # live at https://USER.github.io/REPO_NAME/ (e.g. note_app.github.io).
      # User/org site repo USER.github.io must use base `/`.
      - name: Build Vue App
        working-directory: NotesApplication.Frontend
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            npm run build -- --base=/
          else
            npm run build -- --base=/${REPO}/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This points to the folder created by 'npm run build'
          path: './NotesApplication.Frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
